# ============================================================
#  ThreatScope — docker/apache.conf
#  Apache 2.4 virtual host configuration
#  Replaces /etc/apache2/sites-available/000-default.conf
# ============================================================

<VirtualHost *:80>
    ServerAdmin  webmaster@localhost
    DocumentRoot /var/www/html

    # ── Logging ───────────────────────────────────────────────
    # Log to stdout/stderr so Docker captures them with docker logs
    ErrorLog  /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined

    # ── Document root permissions ─────────────────────────────
    <Directory /var/www/html>
        Options -Indexes -ExecCGI +FollowSymLinks
        AllowOverride All
        Require all granted

        # DirectoryIndex — serve index.php for bare directory requests
        DirectoryIndex index.php index.html
    </Directory>

    # ── Block vendor/ from all web access ─────────────────────
    <Directory /var/www/html/vendor>
        Require all denied
    </Directory>

    # ── Block data/ from all web access ───────────────────────
    # Contains history.json, settings.json, rate_limits.json
    <Directory /var/www/html/data>
        Require all denied
    </Directory>

    # ── Block docker/ config files ────────────────────────────
   # <Directory /var/www/html/docker>
   #     Require all denied
   # </Directory>

    # ── Block sensitive individual files ──────────────────────
    <FilesMatch "^(config\.php|composer\.(json|lock)|Dockerfile|docker-compose\.yml|\.env|\.gitignore|\.dockerignore)$">
        Require all denied
    </FilesMatch>

    # ── Block hidden files (.git, .htaccess etc.) ─────────────
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    # ── Block markdown/docs from web access ───────────────────
    <FilesMatch "\.(md|txt)$">
        Require all denied
    </FilesMatch>

    # ── Security response headers ─────────────────────────────
    <IfModule mod_headers.c>
        Header always set X-Frame-Options        "SAMEORIGIN"
        Header always set X-Content-Type-Options "nosniff"
        Header always set Referrer-Policy        "strict-origin-when-cross-origin"
        Header always set X-XSS-Protection       "1; mode=block"
        # Uncomment when serving over HTTPS:
        # Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

        # Remove Apache version banner
        Header always unset X-Powered-By
        Header always unset Server
    </IfModule>

    # ── Static asset caching ──────────────────────────────────
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType text/css                  "access plus 7 days"
        ExpiresByType application/javascript    "access plus 7 days"
        ExpiresByType font/woff2                "access plus 30 days"
        ExpiresByType image/png                 "access plus 7 days"
        ExpiresByType image/jpeg                "access plus 7 days"
        ExpiresByType image/x-icon              "access plus 30 days"
    </IfModule>

</VirtualHost>
