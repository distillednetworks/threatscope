; ============================================================
;  ThreatScope — docker/php.ini
;  Production PHP configuration
; ============================================================

; ── Error handling ────────────────────────────────────────────
; Never display errors to the browser in production
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /proc/self/fd/2       ; Log to Docker stdout/stderr
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; ── Performance ───────────────────────────────────────────────
; OPcache dramatically speeds up PHP — pre-compiles PHP files
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 4000
opcache.revalidate_freq = 60
opcache.fast_shutdown = 1

; ── Security ──────────────────────────────────────────────────
; Hide PHP version from HTTP headers
expose_php = Off

; Disable dangerous functions not needed by this app
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,parse_ini_file,show_source

; ── Session security ──────────────────────────────────────────
session.cookie_httponly = 1
session.cookie_samesite = Strict
session.use_strict_mode = 1
session.cookie_secure = 0         ; Set to 1 when serving over HTTPS

; ── Timeouts ──────────────────────────────────────────────────
; External API calls (VirusTotal, MISP etc.) can be slow
max_execution_time = 45
max_input_time = 30
default_socket_timeout = 15

; ── Memory ────────────────────────────────────────────────────
memory_limit = 128M

; ── File uploads ──────────────────────────────────────────────
upload_max_filesize = 2M
post_max_size = 4M

; ── Character encoding ────────────────────────────────────────
default_charset = UTF-8
mbstring.internal_encoding = UTF-8
